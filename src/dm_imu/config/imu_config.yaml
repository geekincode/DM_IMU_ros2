dm_imu_node:
  ros__parameters:
    imu:
      # RPY 偏移纠正参数 (单位: 度)
      # 用于校正 IMU 的安装角度偏差
      roll_offset: 0.0      # 横滚角偏移
      pitch_offset: 0.0       # 俯仰角偏移
      yaw_offset: 0.0         # 偏航角偏移
      
      # 启动时自动校准参数
      calibrate_on_startup: false  # 是否在启动时自动校准 (使 RPY 为 0)
      calibration_samples: 100    # 校准采集样本数
      calibration_timeout_ms: 5000  # 校准超时时间 (毫秒)
